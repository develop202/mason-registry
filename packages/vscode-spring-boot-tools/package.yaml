---
name: vscode-spring-boot-tools
description: |
  VS Code Language Server for Spring Boot
  VSCode extension and Language Server providing support for working with Spring Boot application.properties, application.yml and .java files.

  Note: this extension has a dependency on VS Code extension of Language Support for Java™ by Red Hat.
homepage: https://github.com/spring-projects/spring-tools
licenses:
  - EPL-1.0
languages:
  - Java
categories:
  - LSP
source:
  # renovate:versioning=regex:^vscode-spring-boot-(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-RC(\d+)$
  # renovate:datasource=github-tags
  id: pkg:github/spring-projects/spring-tools@vscode-spring-boot-2.1.1-RC1
  asset: 
    file: v{{version|strip_prefix "v"}}.vsix
  # download:
  #   files:
  #     vscode-spring-boot.vsix: https://open-vsx.org/api/VMware/vscode-spring-boot/{{version}}/file/VMware.vscode-spring-boot-{{version}}.vsix
schemas:
  lsp: vscode:https://raw.githubusercontent.com/spring-projects/spring-tools/{{version}}/vscode-extensions/vscode-spring-boot/package.json
